<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTI | Capacity Building Program - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .login-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(34, 197, 94, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            z-index: -1;
        }
        .login-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="1" fill="rgba(255,255,255,0.03)"/></svg>');
            background-size: 50px 50px;
        }
    </style>
</head>
<body>
    <div class="login-bg"></div>

    <div class="login-page">
        <div class="login-card animate-fade-in">
            <div class="login-header">
                <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
                    <span class="brand-logo">NTI</span>
                    <div class="brand-subtitle text-start">
                        <div>CAPACITY BUILDING</div>
                        <div>PROGRAM</div>
                    </div>
                </div>
                <p class="login-subtitle">Sign in to your candidate account</p>
            </div>

            <form id="login-form" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <label class="d-flex align-items-center gap-2" style="cursor: pointer;">
                        <input type="checkbox" style="accent-color: var(--accent-green);">
                        <span style="font-size: 0.85rem; color: var(--text-muted);">Remember me</span>
                    </label>
                    <a href="#" style="font-size: 0.85rem; color: var(--accent-green); text-decoration: none;">Forgot password?</a>
                </div>

                <button type="submit" class="btn-nti btn-nti-primary w-100 mb-3">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>

                <div class="text-center">
                    <p style="font-size: 0.85rem; color: var(--text-muted);">
                        Don't have an account? 
                        <a href="register.html" style="color: var(--accent-green); text-decoration: none; font-weight: 600;">Register</a>
                    </p>
                </div>
            </form>

            <div class="mt-4 pt-3" style="border-top: 1px solid var(--glass-border);">
                <p class="text-center mb-2" style="font-size: 0.75rem; color: var(--text-muted);">Demo Credentials</p>
                <div class="d-flex gap-2 justify-content-center">
                    <span class="badge" style="background: rgba(34,197,94,0.1); color: var(--accent-green); font-size: 0.75rem;">ahmed@student.nti.eg</span>
                    <span class="badge" style="background: rgba(255,255,255,0.05); color: var(--text-muted); font-size: 0.75rem;">any password</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="completion-modal">
        <div class="modal-box">
            <div class="modal-icon info" id="modal-icon"><i class="fas fa-info-circle"></i></div>
            <h3 class="modal-title" id="modal-title">Title</h3>
            <p class="modal-text" id="modal-text">Message</p>
            <button class="btn-nti btn-nti-primary" id="modal-btn">OK</button>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (email && password) {
                Auth.login(email, password);
                showModal('Welcome!', 'Login successful. Redirecting to dashboard...', 'success', 'Continue', () => {
                    window.location.href = '../dashboard/index.html';
                });
            }
            return false;
        }
    </script>
</body>
</html>
