<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTI | Capacity Building Program - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .login-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(34, 197, 94, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="login-bg"></div>

    <div class="login-page">
        <div class="login-card animate-fade-in">
            <div class="login-header">
                <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
                    <span class="brand-logo">NTI</span>
                    <div class="brand-subtitle text-start">
                        <div>CAPACITY BUILDING</div>
                        <div>PROGRAM</div>
                    </div>
                </div>
                <p class="login-subtitle">Create your candidate account</p>
            </div>

            <form id="register-form" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-input" id="fullname" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-input" id="confirm-password" placeholder="Confirm your password" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Select Track</label>
                    <select class="form-input" id="track" required>
                        <option value="">Choose your track...</option>
                        <option value="frontend">Front-End Development</option>
                        <option value="backend">Back-End Development</option>
                        <option value="fullstack">Full-Stack Development</option>
                        <option value="mobile">Mobile Development</option>
                        <option value="data">Data Science</option>
                    </select>
                </div>

                <button type="submit" class="btn-nti btn-nti-primary w-100 mb-3">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>

                <div class="text-center">
                    <p style="font-size: 0.85rem; color: var(--text-muted);">
                        Already have an account? 
                        <a href="login.html" style="color: var(--accent-green); text-decoration: none; font-weight: 600;">Sign In</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="completion-modal">
        <div class="modal-box">
            <div class="modal-icon info" id="modal-icon"><i class="fas fa-info-circle"></i></div>
            <h3 class="modal-title" id="modal-title">Title</h3>
            <p class="modal-text" id="modal-text">Message</p>
            <button class="btn-nti btn-nti-primary" id="modal-btn">OK</button>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        function handleRegister(e) {
            e.preventDefault();
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                showModal('Error', 'Passwords do not match!', 'info', 'Try Again');
                return false;
            }

            // Demo registration
            const user = { name: fullname, email: email, role: "Candidate Account" };
            localStorage.setItem('nti_user', JSON.stringify(user));
            localStorage.setItem('nti_exam_progress', JSON.stringify({
                iqCompleted: false,
                englishCompleted: false,
                technicalCompleted: false,
                iqScore: 0,
                englishScore: 0,
                technicalScore: 0
            }));

            showModal('Success!', 'Account created successfully. Welcome to NTI!', 'success', 'Continue', () => {
                window.location.href = '../dashboard/index.html';
            });
            return false;
        }
    </script>
</body>
</html>
