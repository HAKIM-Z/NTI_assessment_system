<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - NTI Capacity Building Program</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center w-100">
                <a href="../dashboard/index.html" class="navbar-brand">
                    <span class="brand-logo">NTI</span>
                    <div class="brand-text">
                        <span class="brand-title">Capacity Building</span>
                        <span class="brand-subtitle">Program</span>
                    </div>
                </a>

                <div class="d-flex align-items-center gap-4">
                    <div class="d-none d-md-flex gap-3">
                        <a href="../dashboard/index.html" class="nav-link">Home</a>
                        <a href="#" class="nav-link">Profile</a>
                        <a href="#" class="nav-link">About</a>
                        <a href="#" class="nav-link">Contact</a>
                    </div>

                    <div class="nav-user">
                        <div class="user-info d-none d-sm-block">
                            <div class="user-name" id="user-display">Student</div>
                            <div class="user-role">Candidate Account</div>
                        </div>
                        <button class="btn-logout" onclick="logout()">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-5">
        <h1 class="dashboard-welcome fade-in">YOUR <span>RESULTS</span></h1>

        <div id="results-container">
            <!-- Results will be loaded here by JavaScript -->
        </div>

        <div class="text-center mt-4">
            <a href="../dashboard/index.html" class="btn btn-secondary">← Back to Dashboard</a>
            <button class="btn btn-outline" onclick="resetAllExams()">Retake All Exams</button>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-icon" id="modal-icon">ℹ️</div>
            <div class="modal-title" id="modal-title">Title</div>
            <div class="modal-text" id="modal-text">Message</div>
            <div class="modal-buttons" id="modal-buttons"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        // Initialize Results Page
        document.addEventListener('DOMContentLoaded', function() {
            updateResults();
        });

        function resetAllExams() {
            showModal(
                'Reset All Exams?',
                'This will clear all your exam progress and results. Are you sure?',
                '⚠️',
                [
                    {
                        text: 'Cancel',
                        class: 'btn-secondary',
                        action: () => {}
                    },
                    {
                        text: 'Reset',
                        class: 'btn-danger',
                        action: () => {
                            AppState.exams = {
                                iq: { completed: false, score: 0, answers: {} },
                                english: { completed: false, score: 0, answers: {} },
                                technical: { completed: false, score: 0, answers: {} }
                            };
                            saveState();
                            window.location.reload();
                        }
                    }
                ]
            );
        }
    </script>
</body>
</html>
